{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BuildCRM{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Unbounded:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'crm/app.css' %}?v=dollar-ui-1">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <a class="brand" href="{% url 'ui-dashboard' %}">
        <span class="brand-mark">B</span>
        <span>
          <strong>BuildCRM</strong>
          <small>Real Estate AI</small>
        </span>
      </a>
      <nav class="nav">
        <a href="{% url 'ui-dashboard' %}" class="nav-link">Dashboard</a>
        <a href="/api/" class="nav-link">API</a>
        <a href="/admin/" class="nav-link">Admin</a>
      </nav>
      <div class="legend-card">
        <p>Статусы</p>
        <span><i class="dot available"></i>Свободно</span>
        <span><i class="dot reserved"></i>Бронь</span>
        <span><i class="dot sold"></i>Продано</span>
        <span><i class="dot mortgage"></i>Ипотека</span>
      </div>
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
